naftiko: 1.0.0-alpha2
info:
  label: Trouble Ticket — events subscription
  description: 'Trouble Ticket — events subscription. 3 operations. Lead operation: TM Forum Create a Subscription (hub) to
    Receive Events. Self-contained Naftiko capability covering one Tm Forum business surface.'
  tags:
  - Tm Forum
  - events subscription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TM_FORUM_API_KEY: TM_FORUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: tmf621-trouble-ticket-events-subscription
    baseUri: ''
    description: Trouble Ticket — events subscription business capability. Self-contained, no shared references.
    resources:
    - name: hub
      path: /hub
      operations:
      - name: createhub
        method: POST
        description: TM Forum Create a Subscription (hub) to Receive Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: hub-id
      path: /hub/{id}
      operations:
      - name: hubget
        method: GET
        description: TM Forum Retrieve a Subscription (hub)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: hubdelete
        method: DELETE
        description: TM Forum Remove a Subscription (hub) to Receive Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: tmf621-trouble-ticket-events-subscription-rest
    port: 8080
    description: REST adapter for Trouble Ticket — events subscription. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/hub
      name: hub
      description: REST surface for hub.
      operations:
      - method: POST
        name: createhub
        description: TM Forum Create a Subscription (hub) to Receive Events
        call: tmf621-trouble-ticket-events-subscription.createhub
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hub/{id}
      name: hub-id
      description: REST surface for hub-id.
      operations:
      - method: GET
        name: hubget
        description: TM Forum Retrieve a Subscription (hub)
        call: tmf621-trouble-ticket-events-subscription.hubget
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: hubdelete
        description: TM Forum Remove a Subscription (hub) to Receive Events
        call: tmf621-trouble-ticket-events-subscription.hubdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tmf621-trouble-ticket-events-subscription-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trouble Ticket — events subscription. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: tm-forum-create-subscription-hub
      description: TM Forum Create a Subscription (hub) to Receive Events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tmf621-trouble-ticket-events-subscription.createhub
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tm-forum-retrieve-subscription-hub
      description: TM Forum Retrieve a Subscription (hub)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tmf621-trouble-ticket-events-subscription.hubget
      outputParameters:
      - type: object
        mapping: $.
    - name: tm-forum-remove-subscription-hub
      description: TM Forum Remove a Subscription (hub) to Receive Events
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tmf621-trouble-ticket-events-subscription.hubdelete
      outputParameters:
      - type: object
        mapping: $.
