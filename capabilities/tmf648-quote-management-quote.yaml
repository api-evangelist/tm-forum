naftiko: 1.0.0-alpha2
info:
  label: Quote — quote
  description: 'Quote — quote. 5 operations. Lead operation: List or find Quote objects. Self-contained Naftiko capability
    covering one Tm Forum business surface.'
  tags:
  - Tm Forum
  - quote
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TM_FORUM_API_KEY: TM_FORUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: tmf648-quote-management-quote
    baseUri: https://serverRoot/tmf-api/quoteManagement/v4
    description: Quote — quote business capability. Self-contained, no shared references.
    resources:
    - name: quote
      path: /quote
      operations:
      - name: listquote
        method: GET
        description: List or find Quote objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: Comma-separated properties to be provided in response
        - name: offset
          in: query
          type: integer
          description: Requested index for start of resources to be provided in response
        - name: limit
          in: query
          type: integer
          description: Requested number of resources to be provided in response
      - name: createquote
        method: POST
        description: Creates a Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: quote
          in: body
          type: string
          description: The Quote to be created
          required: true
    - name: quote-id
      path: /quote/{id}
      operations:
      - name: retrievequote
        method: GET
        description: Retrieves a Quote by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the Quote
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated properties to provide in response
      - name: patchquote
        method: PATCH
        description: Updates partially a Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the Quote
          required: true
        - name: quote
          in: body
          type: string
          description: The Quote to be updated
          required: true
      - name: deletequote
        method: DELETE
        description: Deletes a Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the Quote
          required: true
  exposes:
  - type: rest
    namespace: tmf648-quote-management-quote-rest
    port: 8080
    description: REST adapter for Quote — quote. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/quote
      name: quote
      description: REST surface for quote.
      operations:
      - method: GET
        name: listquote
        description: List or find Quote objects
        call: tmf648-quote-management-quote.listquote
        with:
          fields: rest.fields
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createquote
        description: Creates a Quote
        call: tmf648-quote-management-quote.createquote
        with:
          quote: rest.quote
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quote/{id}
      name: quote-id
      description: REST surface for quote-id.
      operations:
      - method: GET
        name: retrievequote
        description: Retrieves a Quote by ID
        call: tmf648-quote-management-quote.retrievequote
        with:
          id: rest.id
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchquote
        description: Updates partially a Quote
        call: tmf648-quote-management-quote.patchquote
        with:
          id: rest.id
          quote: rest.quote
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletequote
        description: Deletes a Quote
        call: tmf648-quote-management-quote.deletequote
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tmf648-quote-management-quote-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quote — quote. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: list-find-quote-objects
      description: List or find Quote objects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tmf648-quote-management-quote.listquote
      with:
        fields: tools.fields
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-quote
      description: Creates a Quote
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tmf648-quote-management-quote.createquote
      with:
        quote: tools.quote
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieves-quote-id
      description: Retrieves a Quote by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tmf648-quote-management-quote.retrievequote
      with:
        id: tools.id
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: updates-partially-quote
      description: Updates partially a Quote
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: tmf648-quote-management-quote.patchquote
      with:
        id: tools.id
        quote: tools.quote
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-quote
      description: Deletes a Quote
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tmf648-quote-management-quote.deletequote
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
