naftiko: "1.0.0-alpha1"

info:
  label: "TMF621 Trouble Ticket Management"
  description: "TM Forum Trouble Ticket Management API for managing support tickets and incident lifecycle."
  tags:
    - TM Forum
    - Trouble Ticket
    - Support
    - Telecommunications
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TMF_API_KEY: TMF_API_KEY

capability:
  consumes:
    - type: http
      namespace: tmf621
      baseUri: https://serverRoot/tmf-api/troubleTicket/v5
      description: "TM Forum Trouble Ticket Management API v5"
      authentication:
        type: bearer
        token: "{{TMF_API_KEY}}"
      resources:
        - name: troubleTicket
          path: /troubleTicket
          description: Trouble tickets
          operations:
            - name: listTroubleTicket
              method: GET
              description: "TM Forum List or Find Trouble Ticket Objects"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Offset for pagination
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Limit for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: createTroubleTicket
              method: POST
              description: "TM Forum Create a Trouble Ticket"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  severity: "{{tools.severity}}"
            - name: retrieveTroubleTicket
              method: GET
              description: "TM Forum Retrieve a Trouble Ticket by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Trouble ticket identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: patchTroubleTicket
              method: PATCH
              description: "TM Forum Update Partially a Trouble Ticket"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Trouble ticket identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: tmf621-rest
      resources:
        - path: /v1/trouble-tickets
          name: trouble-tickets
          description: "Trouble tickets"
          operations:
            - method: GET
              name: list-trouble-tickets
              description: "List trouble tickets"
              call: "tmf621.listTroubleTicket"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-trouble-ticket
              description: "Create a new trouble ticket"
              call: "tmf621.createTroubleTicket"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: tmf621-mcp
      transport: http
      tools:
        - name: list-trouble-tickets
          description: "List or find trouble tickets"
          hints:
            readOnly: true
            openWorld: true
          call: "tmf621.listTroubleTicket"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-trouble-ticket
          description: "Retrieve a specific trouble ticket"
          hints:
            readOnly: true
            openWorld: false
          call: "tmf621.retrieveTroubleTicket"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-trouble-ticket
          description: "Create a new trouble ticket"
          hints:
            readOnly: false
            openWorld: false
          call: "tmf621.createTroubleTicket"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-trouble-ticket
          description: "Update the status or details of a trouble ticket"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "tmf621.patchTroubleTicket"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
