naftiko: "1.0.0-alpha1"

info:
  label: "TMF622 Product Order Management"
  description: "TM Forum Product Ordering Management API for managing product orders and cancellations."
  tags:
    - TM Forum
    - Product Ordering
    - BSS
    - Telecommunications
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TMF_API_KEY: TMF_API_KEY

capability:
  consumes:
    - type: http
      namespace: tmf622
      baseUri: https://serverRoot/tmf-api/productOrderingManagement/v5
      description: "TM Forum Product Ordering Management API v5"
      authentication:
        type: bearer
        token: "{{TMF_API_KEY}}"
      resources:
        - name: productOrder
          path: /productOrder
          description: Product orders
          operations:
            - name: listProductOrder
              method: GET
              description: "TM Forum List or Find Product Order Objects"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Offset for pagination
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Limit for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: createProductOrder
              method: POST
              description: "TM Forum Create a Product Order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  requestedStartDate: "{{tools.requestedStartDate}}"
                  orderItem: "{{tools.orderItem}}"
            - name: retrieveProductOrder
              method: GET
              description: "TM Forum Retrieve a Product Order by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Product order identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: patchProductOrder
              method: PATCH
              description: "TM Forum Update Partially a Product Order"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Product order identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tmf622-rest
      resources:
        - path: /v1/product-orders
          name: product-orders
          description: "Product orders"
          operations:
            - method: GET
              name: list-product-orders
              description: "List product orders"
              call: "tmf622.listProductOrder"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-product-order
              description: "Create a new product order"
              call: "tmf622.createProductOrder"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tmf622-mcp
      transport: http
      tools:
        - name: list-product-orders
          description: "List or find product orders"
          hints:
            readOnly: true
            openWorld: true
          call: "tmf622.listProductOrder"
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-product-order
          description: "Create a new product order"
          hints:
            readOnly: false
            openWorld: false
          call: "tmf622.createProductOrder"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-product-order
          description: "Retrieve a specific product order by ID"
          hints:
            readOnly: true
            openWorld: false
          call: "tmf622.retrieveProductOrder"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
