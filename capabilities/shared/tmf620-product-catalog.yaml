naftiko: "1.0.0-alpha1"

info:
  label: "TMF620 Product Catalog Management"
  description: "TM Forum Product Catalog Management API for managing product offerings, specifications, and categories."
  tags:
    - TM Forum
    - Product Catalog
    - BSS
    - Telecommunications
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TMF_API_KEY: TMF_API_KEY

capability:
  consumes:
    - type: http
      namespace: tmf620
      baseUri: https://serverRoot/tmf-api/productCatalogManagement/v5
      description: "TM Forum Product Catalog Management API v5"
      authentication:
        type: bearer
        token: "{{TMF_API_KEY}}"
      resources:
        - name: category
          path: /category
          description: Product catalog categories
          operations:
            - name: listCategory
              method: GET
              description: "TM Forum List or Find Category Objects"
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: Comma-separated list of fields to return
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Offset for pagination
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Limit for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: createCategory
              method: POST
              description: "TM Forum Create a Category"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: retrieveCategory
              method: GET
              description: "TM Forum Retrieve a Category by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Category identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: catalog
          path: /catalog
          description: Product catalogs
          operations:
            - name: listCatalog
              method: GET
              description: "TM Forum List or Find Catalog Objects"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Offset for pagination
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Limit for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: retrieveCatalog
              method: GET
              description: "TM Forum Retrieve a Catalog by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Catalog identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: productOffering
          path: /productOffering
          description: Product offerings
          operations:
            - name: listProductOffering
              method: GET
              description: "TM Forum List or Find Product Offering Objects"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Offset for pagination
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Limit for pagination
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: createProductOffering
              method: POST
              description: "TM Forum Create a Product Offering"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: retrieveProductOffering
              method: GET
              description: "TM Forum Retrieve a Product Offering by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Product offering identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tmf620-rest
      resources:
        - path: /v1/product-catalog/categories
          name: categories
          description: "Product catalog categories"
          operations:
            - method: GET
              name: list-categories
              description: "List product catalog categories"
              call: "tmf620.listCategory"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-category
              description: "Create a product catalog category"
              call: "tmf620.createCategory"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/product-catalog/offerings
          name: product-offerings
          description: "Product offerings"
          operations:
            - method: GET
              name: list-product-offerings
              description: "List product offerings"
              call: "tmf620.listProductOffering"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tmf620-mcp
      transport: http
      tools:
        - name: list-catalog-categories
          description: "List or find product catalog categories"
          hints:
            readOnly: true
            openWorld: true
          call: "tmf620.listCategory"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-catalog-category
          description: "Retrieve a specific product catalog category"
          hints:
            readOnly: true
            openWorld: false
          call: "tmf620.retrieveCategory"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-catalog-category
          description: "Create a new product catalog category"
          hints:
            readOnly: false
            openWorld: false
          call: "tmf620.createCategory"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-product-offerings
          description: "List or find product offerings in the catalog"
          hints:
            readOnly: true
            openWorld: true
          call: "tmf620.listProductOffering"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-product-offering
          description: "Retrieve a specific product offering"
          hints:
            readOnly: true
            openWorld: false
          call: "tmf620.retrieveProductOffering"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
