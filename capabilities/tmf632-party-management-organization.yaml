    description: Party Management — organization business capability. Self-contained, no shared references.
    resources:
    - name: organization
      path: /organization
      operations:
      - name: listorganization
        method: GET
        description: TM Forum List or Find Organization Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorganization
        method: POST
        description: TM Forum Creates a Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: organization-id
      path: /organization/{id}
      operations:
      - name: retrieveorganization
        method: GET
        description: TM Forum Retrieves a Organization by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchorganization
        method: PATCH
        description: TM Forum Updates Partially a Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
