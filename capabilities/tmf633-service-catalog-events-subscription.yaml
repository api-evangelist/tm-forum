naftiko: 1.0.0-alpha2
info:
  label: Service Catalog Management — events subscription
  description: 'Service Catalog Management — events subscription. 2 operations. Lead operation: Register a listener. Self-contained
    Naftiko capability covering one Tm Forum business surface.'
  tags:
  - Tm Forum
  - events subscription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TM_FORUM_API_KEY: TM_FORUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: tmf633-service-catalog-events-subscription
    baseUri: https://serverRoot/tmf-api/serviceCatalogManagement/v4
    description: Service Catalog Management — events subscription business capability. Self-contained, no shared references.
    resources:
    - name: hub
      path: /hub
      operations:
      - name: registerlistener
        method: POST
        description: Register a listener
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: data
          in: body
          type: string
          description: Data containing the callback endpoint to deliver the information
          required: true
    - name: hub-id
      path: /hub/{id}
      operations:
      - name: unregisterlistener
        method: DELETE
        description: Unregister a listener
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the registered listener
          required: true
  exposes:
  - type: rest
    namespace: tmf633-service-catalog-events-subscription-rest
    port: 8080
    description: REST adapter for Service Catalog Management — events subscription. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/hub
      name: hub
      description: REST surface for hub.
      operations:
      - method: POST
        name: registerlistener
        description: Register a listener
        call: tmf633-service-catalog-events-subscription.registerlistener
        with:
          data: rest.data
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hub/{id}
      name: hub-id
      description: REST surface for hub-id.
      operations:
      - method: DELETE
        name: unregisterlistener
        description: Unregister a listener
        call: tmf633-service-catalog-events-subscription.unregisterlistener
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tmf633-service-catalog-events-subscription-mcp
    port: 9090
    transport: http
    description: MCP adapter for Service Catalog Management — events subscription. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: register-listener
      description: Register a listener
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tmf633-service-catalog-events-subscription.registerlistener
      with:
        data: tools.data
      outputParameters:
      - type: object
        mapping: $.
    - name: unregister-listener
      description: Unregister a listener
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tmf633-service-catalog-events-subscription.unregisterlistener
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
