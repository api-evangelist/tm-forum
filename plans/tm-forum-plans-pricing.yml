description: TM Forum is a member-based industry association that publishes the Open APIs (TMF specifications)
  as standards. There is no commercial, public-rate-card pricing for "the TM Forum APIs" themselves —
  implementations are built and operated by member CSPs and software vendors. Access to TM Forum's published
  artifacts is gated by association membership, with fees negotiated per organization. This artifact captures
  that model as a single Contact Sales / Membership plan.
sources:
  - https://www.tmforum.org/
notes: TM Forum membership pricing was not retrievable via WebFetch (403 on the membership page) and the
  API standards themselves are not commercially licensed individually. Contact TM Forum for membership
  fees and terms.
plans:
  - id: tm-forum-membership
    name: TM Forum Membership
    type: enterprise
    description: Annual membership in TM Forum, negotiated by organization size and category. Membership
      is the gate to the Open API conformance program and full specification access. Public list pricing
      is not exposed; contact TM Forum directly.
    entries:
      - label: Annual Membership
        name: annual_membership
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Open API Specifications
      - name: Conformance Program
      - name: Member-only Resources
