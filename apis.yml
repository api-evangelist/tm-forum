aid: tm-forum
name: TM Forum
description: TM Forum is a global industry association that helps communications service providers (CSPs) and technology suppliers
  to digitally transform and thrive in the digital economy. Through collaboration across 850+ member organizations in 180
  countries, TM Forum develops the Open API suite — a portfolio of 88+ standardized REST APIs (Apache 2.0 licensed) covering
  the full telecommunications business support systems (BSS) and operations support systems (OSS) landscape, including product
  catalog, ordering, customer management, inventory, billing, network resources, and partner management. The Open APIs implement
  consistent REST/JSON patterns aligned to the TM Forum Information Framework (SID) and enable interoperability across telecom
  ecosystems.
kind: contract
position: Consuming
access: 3rd-Party
