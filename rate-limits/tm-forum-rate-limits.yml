specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: TM Forum
providerId: tm-forum
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telco
  - Telecommunications
  - Open APIs
  - Standards
  - Rate Limiting
description: TM Forum publishes API specifications, not a hosted API service. Rate limits for any TMF
  Open API are determined by the implementer (CSP or vendor) running the API, not by TM Forum itself.
  No rate-limit artifact can be reconciled at the standards-body level.
sources:
  - https://www.tmforum.org/
notes: 'TM Forum is the standards body; the implementing CSP/vendor sets the actual rate limits per deployment.
  No central limits exist to reconcile.'
limits:
  - name: TMF Open API rate limits
    scope: implementer
    metric: varies
    limit: set by the CSP / vendor that implements the TMF specification
policies:
  - name: Implementer-Defined Limits
    description: Each operator that exposes a TMF Open API publishes (or contracts) its own throttling,
      burst, and quota policy. Consumers must consult the specific operator's developer portal for actionable
      numbers.
maintainers:
