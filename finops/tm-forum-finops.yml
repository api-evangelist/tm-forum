meters:
  - name: tm_forum_membership_year
    description: One year of TM Forum association membership at the contracted tier.
    unit: year
    aggregation: sum
    dimensions:
      - tier
      - organization
principles:
  - name: Visibility
    description: Track the TM Forum membership invoice as a fixed annual line; for downstream API costs,
      visibility is the responsibility of the implementer that runs the TMF API.
  - name: Allocation
    description: Allocate the membership fee to the central architecture/standards function that uses
      the conformance program; do not attempt to per-call attribute it.
  - name: Optimization
    description: Review the membership tier annually against actual use of conformance, working groups,
      and event credits.
  - name: Accountability
    description: Designate the standards/architecture lead as the membership owner.
