description: 'TM Forum is a not-for-profit industry association whose direct customer billing surface
  is association membership rather than API consumption. There is no FOCUS-aligned per-request meter at
  the TM Forum level; FinOps for "TMF APIs" applies to the operator that implements them.'
sources:
  - https://www.tmforum.org/
notes: TM Forum membership pricing not retrievable (403). FOCUS columns and meters here describe membership
  billing only; per-request meters belong to the implementing CSP or vendor.
billingModel:
  pricingCategory: Membership
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
